<!doctype html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>انتخاب هوشمندانه بیمه</title>
  <link rel="icon" type="image/png" sizes="48x48" href="https://raw.githubusercontent.com/aliakbar-najafi/2/main/icon%20web%20chrome.png">
  <meta name="description" content="مقایسه شفاف همه شرکت‌های بیمه و پیشنهاد ارزان‌ترین گزینه با بهترین شرایط پرداخت: آنلاین، کارشناس سیار، اقساطی بدون چک، بدون سود، بدون سفته. مشاوره رایگان.">
  <meta name="format-detection" content="telephone=no">
  
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;700;800;900&display=swap" rel="stylesheet">

  <style>
    /* ========================================================
       پالت رنگی و متغیرهای مدرن (Premium SaaS Dark Mode)
       ======================================================== */
    :root {
      --bg-base: #090d16;
      --glass-bg: rgba(17, 24, 39, 0.65);
      --glass-border: rgba(255, 255, 255, 0.08);
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      
      /* رنگ‌های نئونی پایه */
      --emerald: #10b981;
      --emerald-glow: rgba(16, 185, 129, 0.3);
      --cyan: #06b6d4;
      --cyan-glow: rgba(6, 182, 212, 0.3);
      
      /* رنگ‌های برند برای کارت‌های تماس */
      --brand-rubika: #f97316;
      --brand-telegram: #3b82f6;
      --brand-phone: #10b981;
      --brand-email: #eab308;

      --radius: 16px;
      --max: 96rem;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; scroll-behavior: smooth; }
    
    body {
      font-family: "Vazirmatn", system-ui, -apple-system, sans-serif;
      background-color: var(--bg-base);
      /* افکت هاله نوری در پس‌زمینه بدنه */
      background-image: 
        radial-gradient(800px circle at 15% -5%, rgba(16, 185, 129, 0.08), transparent 70%),
        radial-gradient(800px circle at 85% 105%, rgba(6, 182, 212, 0.08), transparent 70%);
      background-attachment: fixed;
      color: var(--text-main);
      line-height: 1.8;
      letter-spacing: -0.01em;
      -webkit-text-size-adjust: 100%;
      text-rendering: optimizeLegibility;
    }

    a { color: inherit; text-decoration: none; transition: all 0.3s ease; }
    img { max-width: 100%; height: auto; }
    .container { max-width: var(--max); margin: 0 auto; padding: 0 1rem; }

    /* ========================================================
       المان‌های شیشه‌ای (Glassmorphism)
       ======================================================== */
    .glass {
      background: var(--glass-bg);
      backdrop-filter: blur(16px) saturate(180%);
      -webkit-backdrop-filter: blur(16px) saturate(180%);
      border: 1px solid var(--glass-border);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
    }

    /* ========================================================
       تایپوگرافی و گرادیان متنی
       ======================================================== */
    h1, h2 {
      margin: 0 0 1rem;
      background: linear-gradient(135deg, var(--emerald), var(--cyan));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      display: inline-block;
      line-height: 1.4;
    }
    h1 { font-size: clamp(1.4rem, 3vw, 2.2rem); font-weight: 900; }
    h2 { font-size: clamp(1.2rem, 2.2vw, 1.6rem); font-weight: 800; }

    #animated-title { display: block; margin-bottom: 0.5rem; }
    #typed-text {
      background: linear-gradient(135deg, var(--emerald), var(--cyan));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    #cursor {
      display: inline-block; width: 2px;
      animation: blink 1s infinite;
      color: var(--emerald);
      -webkit-text-fill-color: var(--emerald);
      font-weight: bold; margin-right: 4px;
    }
    @keyframes blink { 0%, 50% { opacity: 1; } 51%, 100% { opacity: 0; } }

    /* ========================================================
       هدر و ناوبری
       ======================================================== */
    header {
      position: sticky; top: 0; z-index: 100;
      background: rgba(9, 13, 22, 0.8);
      backdrop-filter: blur(16px) saturate(180%);
      -webkit-backdrop-filter: blur(16px) saturate(180%);
      border-bottom: 1px solid var(--glass-border);
    }
    nav {
      display: flex; align-items: center; justify-content: space-between;
      gap: 0.75rem; padding: 0.85rem 0;
    }
    .brand { display: flex; align-items: center; gap: 0.75rem; font-weight: 800; }
    .logo {
      width: 3rem; height: 3rem; border-radius: 0.8rem;
      background: linear-gradient(135deg, var(--emerald), var(--cyan));
      display: grid; place-items: center; color: #090d16; font-weight: 900;
      box-shadow: 0 4px 15px var(--emerald-glow);
    }

    /* منوی موبایل */
    .menu-toggle {
      display: inline-flex; align-items: center; justify-content: center;
      width: 2.75rem; height: 2.75rem; border-radius: 0.75rem;
      border: 1px solid var(--glass-border); background: var(--glass-bg);
      color: var(--text-main); cursor: pointer; transition: all 0.3s ease;
    }
    .menu-toggle:hover { background: rgba(255, 255, 255, 0.1); }
    
    .nav-links {
      position: absolute; right: 1rem; left: 1rem; top: 4.5rem;
      flex-direction: column; gap: 0.5rem; padding: 1rem;
      border-radius: 1rem;
      opacity: 0; visibility: hidden; transform: translateY(-15px);
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .nav-open .nav-links { opacity: 1; visibility: visible; transform: translateY(0); display: flex; }
    .nav-links a { padding: 0.6rem 1rem; border-radius: 0.6rem; font-weight: 700; color: var(--text-muted); }
    .nav-links a:hover { background: rgba(255, 255, 255, 0.05); color: var(--text-main); }

    /* دسکتاپ */
    @media (min-width: 768px) {
      .menu-toggle { display: none; }
      .nav-links {
        position: static; display: flex; flex-direction: row; opacity: 1; visibility: visible;
        transform: translateY(0); background: transparent; border: none; box-shadow: none; padding: 0;
      }
      .nav-links a { padding: 0.5rem 0.8rem; }
    }

    .cta-top a {
      background: linear-gradient(135deg, var(--emerald), var(--cyan));
      color: #022c22; padding: 0.6rem 1.2rem; border-radius: 999px; font-weight: 800;
      box-shadow: 0 4px 15px var(--emerald-glow); white-space: nowrap; transition: transform 0.3s, box-shadow 0.3s;
    }
    .cta-top a:hover {
      transform: scale(1.05);
      box-shadow: 0 8px 25px var(--emerald-glow);
    }
    @media (max-width: 767px) { .cta-top { display: none; } }

    /* ========================================================
       بخش قهرمان (Hero Section)
       ======================================================== */
    .hero { padding: 3rem 0 2rem; }
    .hero-card {
      border-radius: 1.5rem; overflow: hidden;
      display: grid; grid-template-columns: 1fr;
    }
    .hero-content { padding: 2rem; }
    .sub { color: var(--text-muted); margin: 0 0 1.5rem; font-size: clamp(1rem, 1.8vw, 1.1rem); font-weight: 400; }
    
    .inline { display: flex; flex-wrap: wrap; gap: 0.75rem; margin-bottom: 2rem; }
    .badge {
      display: inline-flex; align-items: center; gap: 0.5rem;
      color: var(--emerald); font-weight: 700; font-size: 0.9rem;
      padding: 0.5rem 1rem; border-radius: 999px;
      background: rgba(16, 185, 129, 0.1); border: 1px solid rgba(16, 185, 129, 0.2);
      transition: transform 0.3s, background 0.3s;
    }
    .badge:hover { transform: translateY(-2px); background: rgba(16, 185, 129, 0.15); }

    .hero-actions { display: flex; gap: 0.8rem; flex-wrap: wrap; }
    
    /* دکمه‌های مدرن */
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 0.5rem;
      padding: 0.85rem 1.5rem; border-radius: 1rem; font-weight: 800;
      border: 1px solid var(--glass-border); background: rgba(255, 255, 255, 0.03); color: var(--text-main);
      min-height: 3rem; touch-action: manipulation; cursor: pointer; transition: all 0.3s ease;
    }
    .btn:hover { background: rgba(255, 255, 255, 0.08); }
    .btn.primary {
      background: linear-gradient(135deg, var(--emerald), #059669);
      color: #022c22; border: none; box-shadow: 0 6px 20px rgba(16, 185, 129, 0.25);
    }
    .btn.primary:hover {
      transform: scale(1.03) translateY(-2px);
      box-shadow: 0 10px 25px rgba(16, 185, 129, 0.4);
    }
    .btn:active { transform: scale(0.98); }

    .hero-side {
      padding: 2rem; background: rgba(9, 13, 22, 0.4);
      border-top: 1px solid var(--glass-border); display: flex; flex-direction: column; gap: 1rem;
    }
    .check {
      display: flex; gap: 0.75rem; align-items: flex-start; padding: 1rem;
      border-radius: 1rem; background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--glass-border); font-size: 0.95rem;
      transition: transform 0.3s, border-color 0.3s;
    }
    .check:hover { transform: translateX(-5px); border-color: rgba(16, 185, 129, 0.3); }
    .check b { color: var(--emerald); }

    @media (min-width: 900px) {
      .hero-card { grid-template-columns: 1.3fr 0.9fr; }
      .hero-side { border-top: none; border-inline-start: 1px solid var(--glass-border); }
    }

    /* ========================================================
       سکشن‌ها و گریدها
       ======================================================== */
    section { padding: 3rem 0; }
    .grid {
      display: grid; gap: 1.25rem;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    }
    
    .card {
      border-radius: 1.25rem; padding: 1.5rem;
      transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.4s ease;
    }
    .card:hover { transform: translateY(-5px); box-shadow: 0 12px 30px rgba(0, 0, 0, 0.3); }
    
    .label { font-size: 0.85rem; color: var(--cyan); margin-bottom: 0.5rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px;}
    .card > strong { display: block; font-size: 1.1rem; margin-bottom: 0.75rem; color: var(--text-main); }
    .card p { color: var(--text-muted); margin: 0; }
    
    .list { display: grid; gap: 0.6rem; margin: 1rem 0 0; padding: 0; }
    .list li { list-style: none; display: flex; gap: 0.6rem; align-items: flex-start; color: var(--text-muted); }

    .divider { height: 1px; background: linear-gradient(90deg, transparent, var(--glass-border), transparent); margin: 2rem 0; }
    .mono { font-family: ui-monospace, Menlo, Monaco, Consolas, monospace; letter-spacing: 1px; color: var(--text-main); }

    /* ========================================================
       آکاردئون لو
